<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>VPN Account Generator</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <link rel="stylesheet" href="/css/style.css?v=1.1" />
</head>
<body>

  <!-- Overlay Telegram Only -->
  <div id="telegramOnlyOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;">
    <div style="font-size: 64px; margin-bottom: 16px;">📱</div>
    <h2 style="margin-bottom: 12px; color: var(--text);">Akses Ditolak</h2>
    <p style="color: var(--hint); margin-bottom: 24px; max-width: 300px;">Aplikasi ini hanya dapat diakses melalui Telegram Mini App.</p>
    <a href="http://t.me/kedaissh_free_accountBot" style="display: inline-block; background: var(--accent); color: var(--accent-text); padding: 14px 24px; border-radius: var(--radius-sm); text-decoration: none; font-weight: 700; font-size: 16px; transition: opacity 0.2s;">Open In Telegram App</a>
  </div>

  <div class="app-container" id="mainAppContainer" style="display: none;">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">🔐</div>
      <h1>VPN Account Generator</h1>
      <p>Buat akun VPN kamu dengan mudah</p>
    </div>

    <!-- Form Card -->
    <div class="card" id="formCard">
      <!-- Pilihan Protokol -->
      <div class="form-group">
        <label>Tipe Akun</label>
        <div class="protocol-grid">
          <button class="proto-btn active" data-proto="ssh" onclick="selectProtocol(this, 'ssh')">
            🔐 SSH
          </button>
          <button class="proto-btn" data-proto="vmess" onclick="selectProtocol(this, 'vmess')">
            💎 Vmess
          </button>
          <button class="proto-btn" data-proto="vless" onclick="selectProtocol(this, 'vless')">
            ⚡ Vless
          </button>
          <button class="proto-btn" data-proto="trojan" onclick="selectProtocol(this, 'trojan')">
            🛡️ Trojan
          </button>
        </div>
      </div>

      <!-- Pilihan Server -->
      <div class="form-group">
        <label for="serverSelect">Pilih Server</label>
        <select id="serverSelect" onchange="onServerChange()">
          <option value="">⌛ Memuat server...</option>
        </select>
      </div>

      <!-- Info Server -->
      <div class="server-info" id="serverInfo" style="display:none;">
        <div class="info-row">
          <span>⏱️ Masa Aktif</span>
          <span id="infoDuration">-</span>
        </div>
        <div class="info-row">
          <span>📶 Kuota</span>
          <span id="infoQuota">-</span>
        </div>
        <div class="info-row">
          <span>🖥️ Limit IP</span>
          <span id="infoIpLimit">-</span>
        </div>
        <div class="info-row">
          <span>👥 User Saat Ini</span>
          <span id="infoUsers">-</span>
        </div>
      </div>

      <!-- Input Username -->
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          placeholder="Masukkan username..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
        />
      </div>

      <!-- Input Password (SSH only) -->
      <div class="form-group" id="passwordGroup">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Masukkan password..."
        />
      </div>

      <!-- Cloudflare Turnstile -->
      <div class="form-group">
        <label>Verifikasi Keamanan</label>
        <div class="turnstile-wrap">
          <div id="turnstileWidget"></div>
        </div>
      </div>

      <!-- Tombol Submit -->
      <button class="btn-create" id="btnCreate" onclick="submitForm()">
        <span id="btnText">🚀 Create Account</span>
        <span id="btnLoader" style="display:none;">⌛ Memproses...</span>
      </button>
    </div>

    <!-- Result Card (tersembunyi, muncul setelah sukses) -->
    <div class="card result-card" id="resultCard" style="display:none;">
      <div class="result-icon">✅</div>
      <h2>Akun Berhasil Dibuat!</h2>
      <p>Detail akun telah dikirim ke chat Telegram kamu.</p>
      <div class="result-detail" id="resultDetail"></div>
      <button class="btn-back" onclick="resetForm()">🔄 Buat Akun Lagi</button>
    </div>

    <!-- Error Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="/js/app.js?v=1.5"></script>
</body>
</html>
